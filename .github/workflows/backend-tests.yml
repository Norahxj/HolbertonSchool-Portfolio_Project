name: Backend Tests

on:
  push:
    branches:
      - master
      - main
      - Amad
      - manar

  pull_request:
    branches:
      - master
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backEnd

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: backEnd/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          FLASK_ENV: testing
          JWT_SECRET_KEY: github-actions-test-secret
          SECRET_KEY: github-actions-flask-secret
          DATABASE_URL: sqlite:///test.db
        run: |
          python -m pytest -v